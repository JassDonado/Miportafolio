<svg viewBox="0 0 1440 900" fill="none" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid slice">
  <defs>
    <radialGradient id="grad1" cx="20%" cy="20%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:0.25" />
      <stop offset="100%" style="stop-color:#0a0a0a;stop-opacity:0" />
    </radialGradient>
    
    <radialGradient id="grad2" cx="80%" cy="70%">
      <stop offset="0%" style="stop-color:#1d4ed8;stop-opacity:0.2" />
      <stop offset="100%" style="stop-color:#0a0a0a;stop-opacity:0" />
    </radialGradient>
    
    <radialGradient id="grad3" cx="50%" cy="50%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:0.15" />
      <stop offset="100%" style="stop-color:#0a0a0a;stop-opacity:0" />
    </radialGradient>
  </defs>
  
  <!-- Fondo base oscuro -->
  <rect width="1440" height="900" fill="#0a0a0a"/>
  
  <!-- Gradientes azules -->
  <circle cx="200" cy="150" r="400" fill="url(#grad1)" />
  <circle cx="1200" cy="600" r="450" fill="url(#grad2)" />
  <circle cx="720" cy="450" r="350" fill="url(#grad3)" />
</svg>
